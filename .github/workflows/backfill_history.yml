name: Backfill Historical Scores

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    name: Backfill weekly history since 2019 + relearn weights
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: files/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r files/requirements.txt

      - name: Step 1 — Backfill with current (or no) weights
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
        run: |
          cd files
          # Remove any stale learned weights so the backfill uses the *raw* model.
          # We need the unbiased baseline to learn corrective signs/weights from.
          rm -f learned_weights.json
          python backfill_history.py

      - name: Step 2 — Learn weights from history
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd files
          python optimize_weights.py
          echo "--- learned_weights.json ---"
          cat learned_weights.json

      - name: Step 3 — Commit learned weights to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/learned_weights.json
          if git diff --cached --quiet; then
            echo "No weight changes to commit."
          else
            git commit -m "chore: refresh learned_weights.json from latest backfill"
            git push
          fi

      - name: Step 4 — Re-backfill applying learned weights
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
        run: |
          cd files
          python backfill_history.py
