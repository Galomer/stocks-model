name: Daily Sector Scores

on:
  # Run Mon–Fri at 22:00 UTC (5 PM ET / after US market close)
  schedule:
    - cron: '0 22 * * 1-5'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  score:
    name: Run sector model and save to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: files/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r files/requirements.txt

      - name: Run sector model → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd files
          python save_to_supabase.py
